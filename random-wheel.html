<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
  <style>
    .wheel-outer {
      position: relative;
      width: 360px;
      height: 360px;
      margin: 3rem auto;
      padding: 15px;
      background: var(--surface-solid);
      border-radius: 50%;
      box-shadow: var(--shadow), 0 0 30px rgba(0,0,0,0.2);
    }
    
    .wheel-container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    
    .wheel-canvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      transition: transform 4.5s cubic-bezier(0.15, 0, 0.15, 1);
      border: 8px solid #333;
      box-sizing: border-box;
      background: #222;
    }

    /* 指針 */
    .wheel-pointer {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 50px;
      background: #ffcb3d;
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      z-index: 10;
      filter: drop-shadow(0 4px 5px rgba(0,0,0,0.4));
    }
    
    /* 中心點 */
    .wheel-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      background: white;
      border: 4px solid #333;
      border-radius: 50%;
      z-index: 11;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body class="bg-orbs">

    <nav class="navbar">
      <a class="brand" href="index.html">
        <span class="brand-badge">旅</span>
        <span>溪湖 × 前鎮</span>
      </a>
      <div class="nav-links">
        <a href="index.html">首頁</a>
        <div class="nav-item">
          <a href="xihu.html">溪湖鎮 ▾</a>
          <div class="dropdown-menu">
            <a href="xihu.html#history">歷史沿革</a>
            <a href="xihu.html#geography">地理與氣候</a>
            <a href="xihu.html#population">人口統計</a>
            <a href="xihu.html#attractions">美食與特產</a>
          </div>
        </div>
        <div class="nav-item">
          <a href="qianzhen.html">前鎮區 ▾</a>
          <div class="dropdown-menu">
            <a href="qianzhen.html#history">歷史沿革</a>
            <a href="qianzhen.html#geography">地理與氣候</a>
            <a href="qianzhen.html#economy">經濟與交通</a>
            <a href="qianzhen.html#attractions">美食與購物</a>
          </div>
        </div>
        <div class="nav-item">
          <a href="random-slot.html" class="active">景點推薦 ▾</a>
          <div class="dropdown-menu">
            <a href="random-slot.html">🎰 命運拉霸機</a>
            <a href="random-wheel.html">🎡 幸運轉盤</a>
            <a href="random-scratch.html">🎟 刮刮樂</a>
          </div>
        </div>
        <a href="summary.html">PK 總結</a>
      </div>
      <div class="nav-controls">
        <button id="lang-toggle-btn" onclick="toggleLanguage()">EN</button>
        <button id="theme-toggle-btn" onclick="toggleTheme()">🌙</button>
      </div>
    </nav>
  </header>

  <div class="breadcrumbs">
    <a href="index.html">首頁</a> <span>›</span> 景點推薦 <span>›</span> 幸運大轉盤
  </div>

  <div class="section" id="app">
    <div class="page-container">
      <main class="page-content">
        <div class="glass-card" style="text-align: center;">
          <span class="eyebrow">🎡 Lucky Wheel</span>
          <h2 style="color: var(--primary);">轉動好心情，決定下一站！</h2>

          <!-- 篩選器 -->
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1.2rem; margin-bottom: 2rem; text-align: left;">
            <div>
              <label style="display:block;font-weight:900;margin-bottom:.5rem;font-size:.9rem;">📍 地區</label>
              <select v-model="filters.region" class="btn" style="width:100%;background:var(--surface-solid);color:var(--text);border:1px solid var(--glass-border);padding:12px 16px;">
                <option value="all">不限地區</option>
                <option value="前鎮區">前鎮區</option>
                <option value="溪湖鎮">溪湖鎮</option>
              </select>
            </div>
            <div>
              <label style="display:block;font-weight:900;margin-bottom:.5rem;font-size:.9rem;">📅 星期</label>
              <select v-model="filters.day" class="btn" style="width:100%;background:var(--surface-solid);color:var(--text);border:1px solid var(--glass-border);padding:12px 16px;">
                <option value="all">不限日期</option>
                <option value="Monday">星期一</option>
                <option value="Tuesday">星期二</option>
                <option value="Wednesday">星期三</option>
                <option value="Thursday">星期四</option>
                <option value="Friday">星期五</option>
                <option value="Saturday">星期六</option>
                <option value="Sunday">星期日</option>
              </select>
            </div>
            <div>
              <label style="display:block;font-weight:900;margin-bottom:.5rem;font-size:.9rem;">⏰ 時間</label>
              <select v-model="filters.time" class="btn" style="width:100%;background:var(--surface-solid);color:var(--text);border:1px solid var(--glass-border);padding:12px 16px;">
                <option value="all">全天 / 不限</option>
                <option value="Morning">早上</option>
                <option value="Afternoon">下午</option>
                <option value="Evening">晚上</option>
              </select>
            </div>
          </div>

          <!-- 轉盤 -->
          <div class="wheel-outer">
            <div class="wheel-container">
              <div class="wheel-pointer"></div>
              <div class="wheel-center"></div>
              <canvas ref="canvasRef" class="wheel-canvas" :style="{ transform: `rotate(${spinAngle}deg)` }"></canvas>
            </div>
          </div>
          
          <button class="btn btn-primary" style="padding: 16px 60px; font-size: 1.25rem;" 
                  @click="spinWheel" 
                  :disabled="isSpinning || filteredAttractions.length === 0">
            {{ isSpinning ? '🚀 旋轉中...' : (filteredAttractions.length === 0 ? '⚠️ 無符合條件' : '立即轉動！') }}
          </button>

          <!-- 結果展示 -->
          <div v-if="result && !isSpinning" class="glass-card result-card pop" style="margin-top: 3rem;">
            <span class="region-badge" :class="result.region === '溪湖鎮' ? 'badge-xihu' : 'badge-qianzhen'">{{ result.region }}</span>
            <h3 style="margin-bottom: 1rem; font-size: 2rem;">{{ result.name }}</h3>
            <p style="color: var(--muted); margin-bottom: 2rem; max-width: 520px; margin-left: auto; margin-right: auto;">{{ result.desc }}</p>
            <div style="border-radius: 20px; overflow: hidden; border: 4px solid var(--surface-solid); box-shadow: var(--shadow); max-width: 520px; margin: 0 auto 2rem;">
              <iframe width="100%" height="280" frameborder="0" scrolling="no" 
                :src="'https://maps.google.com/maps?q=' + encodeURIComponent(result.name + ' ' + result.region) + '&t=&z=15&ie=UTF8&iwloc=&output=embed'">
              </iframe>
            </div>
            <a :href="result.link" class="btn" :class="result.region === '溪湖鎮' ? 'btn-xihu' : 'btn-qianzhen'">探索此景點詳情 →</a>
          </div>
        </div>
      </main>

      <aside class="page-sidebar">
        <div class="sidebar-menu">
          <h3>趣味抽選遊戲</h3>
          <ul>
            <li><a href="random-slot.html">🎰 命運拉霸機</a></li>
            <li><a href="random-wheel.html" class="active">🎡 幸運大轉盤</a></li>
            <li><a href="random-scratch.html">🎟️ 神祕刮刮樂</a></li>
          </ul>
        </div>
      </aside>
    </div>

  <footer>
    <strong>雙城對話 © 2026</strong>
    <p>資料來源：維基百科、內政部戶政司</p>
  </footer>

  <script src="script.js"></script>
  <script>
    const { createApp, ref, computed, watch, onMounted } = Vue;
    createApp({
      setup() {
        const attractions = ref([]);
        const isSpinning = ref(false);
        const result = ref(null);
        const spinAngle = ref(0);
        const canvasRef = ref(null);
        const filters = ref({ region: 'all', day: 'all', time: 'all' });

        const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#2A52BE', '#FF9F1C', '#92D050', '#8E44AD', '#34495E'];

        onMounted(async () => {
          try {
            const res = await fetch('attractions.json');
            attractions.value = await res.json();
            drawWheel();
          } catch (e) { console.error(e); }
        });

        const filteredAttractions = computed(() =>
          attractions.value.filter(item => {
            const r = filters.value.region === 'all' || item.region === filters.value.region;
            const d = filters.value.day === 'all' || item.days.includes(filters.value.day);
            const t = filters.value.time === 'all' || item.times.includes(filters.value.time);
            return r && d && t;
          })
        );

        watch(filteredAttractions, () => {
          drawWheel();
          spinAngle.value = 0;
          result.value = null;
        });

        const drawWheel = () => {
          const canvas = canvasRef.value;
          if (!canvas) return;
          canvas.width = 400; canvas.height = 400;
          const ctx = canvas.getContext('2d');
          const pool = filteredAttractions.value;
          if (pool.length === 0) {
            ctx.fillStyle = '#444'; ctx.textAlign = 'center'; ctx.font = '20px sans-serif';
            ctx.fillText('無資料', 200, 200); return;
          }
          const sliceAngle = (2 * Math.PI) / pool.length;
          ctx.clearRect(0, 0, 400, 400);
          for(let i=0; i<pool.length; i++) {
            ctx.beginPath(); ctx.moveTo(200, 200);
            ctx.arc(200, 200, 200, i * sliceAngle, (i+1) * sliceAngle);
            ctx.fillStyle = colors[i % colors.length]; ctx.fill();
            ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke();
          }
        };

        const spinWheel = () => {
          const pool = filteredAttractions.value;
          if (isSpinning.value || !pool.length) return;
          isSpinning.value = true;
          result.value = null;
          new Audio('audio/spin.mp3').play().catch(()=>{});

          const randomIdx = Math.floor(Math.random() * pool.length);
          const sliceDeg = 360 / pool.length;
          // Calculate target rotation to land the pointer (top) on the randomIdx slice
          // Current rotation + 5-8 full spins + target alignment
          const targetRotation = 270 - (randomIdx * sliceDeg + sliceDeg/2);
          const extraSpins = (Math.floor(Math.random() * 4) + 5) * 360;
          
          spinAngle.value += extraSpins + (targetRotation - (spinAngle.value % 360) + 360) % 360;

          setTimeout(() => {
            isSpinning.value = false;
            result.value = pool[randomIdx];
            fireConfetti();
          }, 4500);
        };

        const fireConfetti = () => {
          new Audio('audio/partypopper.mp3').play().catch(()=>{});
          confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 }, zIndex: 10000 });
        };

        return { filters, filteredAttractions, isSpinning, result, spinAngle, canvasRef, spinWheel };
      }
    }).mount('#app');
  </script>
</body>
</html>
